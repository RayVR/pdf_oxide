name: Node.js CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'nodejs/**'
      - 'src/**'
      - '.github/workflows/ci-nodejs.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'nodejs/**'
      - 'src/**'

jobs:
  # Build native modules for all platforms
  build:
    name: Build (${{ matrix.settings.target }})
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          # macOS x64
          - host: macos-latest
            target: x86_64-apple-darwin
          # macOS ARM64
          - host: macos-14
            target: aarch64-apple-darwin
          # Linux x64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Linux ARM64
          - host: buildjet-4vcpu-ubuntu-2204-arm
            target: aarch64-unknown-linux-gnu
          # Windows x64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          # Windows ARM64
          - host: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v3
        with:
          path: nodejs/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: cd nodejs && npm install

      - name: Build release
        run: cd nodejs && npm run build -- --target ${{ matrix.settings.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: nodejs/*.node

  # Run tests
  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: nodejs/

      - name: Install dependencies
        run: cd nodejs && npm install

      - name: Run tests
        run: cd nodejs && npm test

      - name: Run verbose tests
        run: cd nodejs && npm run test:verbose

  # Check code formatting
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd nodejs && npm install

      - name: Check formatting
        run: cd nodejs && npm run format:check || true

  # Prepare artifacts for npm publishing
  prepare-publish:
    name: Prepare for Publishing
    needs: [build, test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: nodejs/artifacts

      - name: Install dependencies
        run: cd nodejs && npm install

      - name: Prepare artifacts
        run: cd nodejs && npm run artifacts

      - name: List prepared artifacts
        run: ls -la nodejs/npm/*/

      - name: Upload prepared packages
        uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: nodejs/npm/

  # Publish to npm (only on tags)
  publish:
    name: Publish to npm
    needs: prepare-publish
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          name: npm-packages
          path: nodejs/npm

      - name: Publish main package
        run: cd nodejs && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish platform-specific packages
        run: |
          cd nodejs/npm
          for dir in */; do
            if [ -f "$dir/package.json" ]; then
              cd "$dir"
              npm publish --access public
              cd ..
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Generate documentation
  docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd nodejs && npm install

      - name: Generate docs
        run: cd nodejs && npm run docs || true

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: nodejs/docs/

  # Notify on completion
  notify:
    name: Notify
    needs: [build, test, format]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All checks passed!"
          else
            echo "❌ Some checks failed"
            exit 1
          fi
