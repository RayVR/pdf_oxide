# OSV-Scanner configuration for pdf_oxide.
#
# Documents the (small) set of known-upstream Rust advisories that have no
# available — or no currently *adoptable* — fix, with explicit per-CVE
# justifications and a 90-day review horizon. Re-evaluate every release.

[[IgnoredVulns]]
id = "RUSTSEC-2024-0436"
# `paste` crate: "no longer maintained" advisory (informational, not a CVE).
# Used transitively by build-macro crates we don't directly depend on. No
# remote-code-execution or memory-safety implication; advisory exists solely
# to flag the unmaintained status. Re-evaluate when transitive consumers
# move off paste (community is migrating to `pastey` / `quote`).
ignoreUntil = 2026-08-23

[[IgnoredVulns]]
id = "RUSTSEC-2023-0071"
# `rsa` crate: known potential Marvin-attack timing side-channel for RSA
# decryption keys. NOT exploitable in our usage: pdf_oxide uses RSA only
# for PAdES signature *verification* of detached signatures (never
# decryption of attacker-controlled ciphertexts), where the timing channel
# is not applicable. No fix version released upstream. Re-evaluate when
# rustcrypto/RSA ships the constant-time rewrite.
ignoreUntil = 2026-08-23

[[IgnoredVulns]]
id = "RUSTSEC-2026-0176"
# `pyo3` crate: out-of-bounds read in the optimized `nth` / `nth_back`
# iterator methods for `PyList` / `PyTuple` when called with a large `n`
# (unchecked `index + n` before bounds-checking). NOT reachable in our
# usage: the binding only constructs lists via `PyList::empty` + `append`
# and never calls `nth` / `nth_back` on a Python list/tuple iterator with a
# caller-controlled index, so the vulnerable path is never executed.
# Fixed upstream in pyo3 0.29.0, but not yet adoptable: pyo3-log (latest
# 0.13.3) requires pyo3 `>=0.26, <0.29`, so taking 0.29 would mean dropping
# the Rust->Python logging bridge. Re-evaluate when pyo3-log adds pyo3 0.29
# support (then bump both).
ignoreUntil = 2026-09-10

[[IgnoredVulns]]
id = "RUSTSEC-2026-0177"
# `pyo3` crate: missing `Sync` bound on closures passed to
# `PyCFunction::new_closure` (a non-Sync closure could be invoked
# concurrently from multiple Python threads — a soundness data race).
# NOT reachable in our usage: the binding does not call
# `PyCFunction::new_closure` / `new_closure_bound` anywhere (all Python
# callables are `#[pyfunction]`/`#[pymethods]`, not runtime closures).
# Same fix and same blocker as RUSTSEC-2026-0176 above: resolved in pyo3
# 0.29.0, which pyo3-log (latest 0.13.3, pyo3 `>=0.26, <0.29`) does not yet
# allow. The only two advisories OSV reports for pyo3 0.28.3. Re-evaluate
# and bump pyo3 + pyo3-log together when pyo3-log adds 0.29 support.
ignoreUntil = 2026-09-10
